# Local OIDC Client Registry for development.
# This file is used when no remote trustedServicesListUrl is configured.
#
# Each entry maps to a Spring Security RegisteredClient.

clients:
  - clientId: "vc-auth-client"
    url: "http://localhost:4200"
    tenant: "local"
    clientAuthenticationMethods:
      - "none"
    authorizationGrantTypes:
      - "authorization_code"
    redirectUris:
      - "http://localhost:4200"
    postLogoutRedirectUris:
      - "http://localhost:4200"
    scopes:
      - "openid"
      - "profile"
      - "email"
      - "offline_access"
      - "learcredential"
      - "role"
    requireAuthorizationConsent: false
    requireProofKey: true

  - clientId: "m2m-test-client"
    url: "http://localhost:9090"
    tenant: "local"
    clientAuthenticationMethods:
      - "none"
    authorizationGrantTypes:
      - "client_credentials"
    redirectUris:
      - "http://localhost:9090"
    postLogoutRedirectUris:
      - "http://localhost:9090"
    scopes:
      - "openid"
      - "learcredential"
    requireAuthorizationConsent: false
