# ══════════════════════════════════════════════════════════════
# EUDIStack Core Verifier — Application Configuration
#
# All values below are dev defaults. Override via env vars in
# production (Spring relaxed binding applies).
# ══════════════════════════════════════════════════════════════

# ── Spring ───────────────────────────────────────────────────
spring:
  application:
    name: vc-verifier
  config:
    import: optional:file:${VERIFIER_BACKEND_LOCALFILES_DCQLPATH:}

# ── Server ───────────────────────────────────────────────────
server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework

# ── Logging ──────────────────────────────────────────────────
logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"
  level:
    es.in2.vcverifier: ${LOGGING_LEVEL_ES_IN2_VCVERIFIER:INFO}
    org.springframework.security: ${LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY:INFO}

# ── Management & Observability ───────────────────────────────
management:
  endpoints:
    enabled-by-default: false
    web:
      exposure:
        include: health, prometheus
      base-path: /
      path-mapping:
        health: health
        prometheus: prometheus
  endpoint:
    health:
      enabled: true
      show-details: always
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: ${OTEL_TRACES_SAMPLER_ARG:1.0}
    propagation:
      type: w3c
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces

# ── Verifier ─────────────────────────────────────────────────
verifier:

  frontend:
    portalUrl: ${VERIFIER_FRONTEND_PORTALURL:http://localhost:4200}

  backend:
    url: ${VERIFIER_BACKEND_URL:http://localhost:8080}

    identity:
      # Leave empty to auto-generate ephemeral P-256 key + did:key at startup (dev only).
      # For production, configure privateKey + certificate for x509_hash client_id_scheme.
      didKey: ${VERIFIER_BACKEND_IDENTITY_DIDKEY:}
      privateKey: ${VERIFIER_BACKEND_IDENTITY_PRIVATEKEY:}
      certificate: ${VERIFIER_BACKEND_IDENTITY_CERTIFICATE:}

    token-expiration:
      access-token-seconds: ${VERIFIER_BACKEND_TOKEN_EXPIRATION_ACCESS_TOKEN_SECONDS:900}
      id-token-seconds: ${VERIFIER_BACKEND_TOKEN_EXPIRATION_ID_TOKEN_SECONDS:60}
      refresh-token-seconds: ${VERIFIER_BACKEND_TOKEN_EXPIRATION_REFRESH_TOKEN_SECONDS:43200}

    local-files:
      clients-path: ${VERIFIER_BACKEND_LOCALFILES_CLIENTSPATH:}
      trusted-issuers-path: ${VERIFIER_BACKEND_LOCALFILES_TRUSTEDISSUERSPATH:}
      schemas-dir: ${VERIFIER_BACKEND_LOCALFILES_SCHEMASDIR:}

  # DCQL profiles are injected via spring.config.import from the external
  # file at VERIFIER_BACKEND_LOCALFILES_DCQLPATH (see dev-tools/verifier/dcql-profiles.yaml).
