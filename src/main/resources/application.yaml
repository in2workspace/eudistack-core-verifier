spring:
  application:
    name: ${OTEL_SERVICE_NAME:vc-verifier}
  config:
    import: optional:file:${VERIFIER_BACKEND_LOCALFILES_DCQLPATH:}

server:
  port: 8082
  forward-headers-strategy: framework

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"
  level:
    es.in2.vcverifier: INFO
    org.springframework.security: INFO

management.tracing:
  sampling:
    probability: ${OTEL_TRACES_SAMPLER_ARG:1.0}
  propagation:
    type: w3c

management.otlp:
  tracing:
    endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces

management:
  endpoints:
    enabled-by-default: false
    web:
      exposure:
        include: health, prometheus
      base-path: /
      path-mapping:
        health: health
        prometheus: prometheus
  endpoint:
    health:
      enabled: true
      show-details: always
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

# ──────────────────────────────────────────────────────────
# Verifier configuration
#
# All values below are dev defaults. Override via env vars
# in production. Spring relaxed binding applies, e.g.:
#   verifier.backend.url -> VERIFIER_BACKEND_URL
# ──────────────────────────────────────────────────────────
verifier:
  frontend:
    portalUrl: http://localhost:4200
  backend:
    url: http://localhost:8082
    identity:
      # Leave empty to auto-generate ephemeral P-256 key + did:key at startup (dev only).
      # For production, configure privateKey + certificate for x509_hash client_id_scheme.
      didKey:
      privateKey:
      certificate:  # Path to X.509 PEM certificate. When set, enables x509_hash client_id_scheme.
    token-expiration:
      access-token-seconds: ${VERIFIER_ACCESS_TOKEN_EXPIRATION:900}
      id-token-seconds: ${VERIFIER_ID_TOKEN_EXPIRATION:60}
      refresh-token-seconds: ${VERIFIER_REFRESH_TOKEN_EXPIRATION:43200}
    trustFrameworks:
      - name: DOME
        # Leave URLs unset to use local providers (classpath YAML files)
        # trustedIssuersListUrl: https://example.org/trusted-issuers
        # trustedServicesListUrl: https://example.org/trusted-services

  # DCQL profiles: map OIDC scopes to DCQL credential queries for wallets.
  # RPs request scopes (e.g. "openid learcredential.employee"), the Verifier
  # resolves them into a DCQL query that the wallet understands.
  dcql:
    profiles:
      learcredential.employee:
        credentials:
          - id: lear_employee_sd_jwt
            format: dc+sd-jwt
            meta:
              vct-values:
                - eu.europa.ec.eudi.lce.1
          - id: lear_employee_jwt_vc
            format: jwt_vc_json
            meta:
              credential-definition:
                type:
                  - VerifiableCredential
                  - learcredential.employee.w3c.4
      learcredential.machine:
        credentials:
          - id: lear_machine_sd_jwt
            format: dc+sd-jwt
            meta:
              vct-values:
                - eu.europa.ec.eudi.lcm.1
          - id: lear_machine_jwt_vc
            format: jwt_vc_json
            meta:
              credential-definition:
                type:
                  - VerifiableCredential
                  - learcredential.machine.w3c.3
      learcredential:
        credentials:
          - id: lear_employee_sd_jwt
            format: dc+sd-jwt
            meta:
              vct-values:
                - eu.europa.ec.eudi.lce.1
          - id: lear_employee_jwt_vc
            format: jwt_vc_json
            meta:
              credential-definition:
                type:
                  - VerifiableCredential
                  - learcredential.employee.w3c.4
