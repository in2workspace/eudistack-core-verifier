# ══════════════════════════════════════════════════════════════
# EUDIStack Core Verifier — Application Configuration
#
# All values below are dev defaults. Override via env vars in
# production (Spring relaxed binding applies).
# ══════════════════════════════════════════════════════════════

# ── Spring ───────────────────────────────────────────────────
spring:
  application:
    name: eudistack-core-verifier
  config:
    import: optional:file:${VERIFIER_FILES_DCQL:}

# ── API Documentation ─────────────────────────────────────────
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true

# ── Server ───────────────────────────────────────────────────
server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework

# ── Logging ──────────────────────────────────────────────────
# Structured JSON logging is activated via LOGGING_STRUCTURED_FORMAT_CONSOLE=ecs
# (Elastic Common Schema). Leave unset for human-readable text in dev.
# Trace context (traceId, spanId) is injected automatically by Micrometer Tracing.
logging:
  structured:
    format:
      console: ${LOGGING_STRUCTURED_FORMAT_CONSOLE:}
  level:
    root: ${LOGGING_LEVEL_ROOT:INFO}
    es.in2.vcverifier: ${LOGGING_LEVEL_ES_IN2_VCVERIFIER:INFO}
    org.springframework.security: ${LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY:WARN}
    org.springframework.web.HttpLogging: ${LOGGING_LEVEL_HTTP:WARN}

# ── Management & Observability ───────────────────────────────
management:
  endpoints:
    access:
      default: none
    web:
      exposure:
        include: health, prometheus
      base-path: /
  endpoint:
    health:
      access: unrestricted
      show-details: ${MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS:never}
    prometheus:
      access: unrestricted
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    enabled: ${MANAGEMENT_TRACING_ENABLED:false}
    sampling:
      probability: ${OTEL_TRACES_SAMPLER_ARG:1.0}
    propagation:
      type: w3c
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces

# ── Verifier ─────────────────────────────────────────────────
verifier:
  url: ${VERIFIER_URL:http://localhost:8080}
  portal-url: ${VERIFIER_PORTAL_URL:http://localhost:4200}

  identity:
    # Leave empty to auto-generate ephemeral P-256 key + did:key at startup (dev only).
    # For production, configure private-key + certificate for x509_hash client_id_scheme.
    did-key: ${VERIFIER_IDENTITY_DID_KEY:}
    private-key: ${VERIFIER_IDENTITY_PRIVATE_KEY:}
    certificate: ${VERIFIER_IDENTITY_CERTIFICATE:}

  token:
    access-token-ttl: ${VERIFIER_TOKEN_ACCESS_TOKEN_TTL:900}
    id-token-ttl: ${VERIFIER_TOKEN_ID_TOKEN_TTL:60}
    refresh-token-ttl: ${VERIFIER_TOKEN_REFRESH_TOKEN_TTL:43200}

  files:
    clients: ${VERIFIER_FILES_CLIENTS:}
    trusted-issuers: ${VERIFIER_FILES_TRUSTED_ISSUERS:}
    schemas: ${VERIFIER_FILES_SCHEMAS:}
    dcql: ${VERIFIER_FILES_DCQL:}

  # DCQL profiles are injected via spring.config.import from the external
  # file at VERIFIER_FILES_DCQL (see dev-tools/verifier/dcql-profiles.yaml).
