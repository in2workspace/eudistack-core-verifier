name: Release

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Release target'
        required: true
        type: choice
        options:
          - docker-push
          - tag-create
        default: 'docker-push'

permissions:
  contents: write
  packages: write

jobs:
  docker-push:
    if: inputs.target == 'docker-push'
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'gradle'

      - name: Make Gradlew Executable
        run: chmod +x ./gradlew

      - name: Get Project Name
        id: project_name
        run: echo "PROJECT_NAME=$(./gradlew -q properties | grep '^name:' | awk '{print $2}')" >> $GITHUB_ENV

      - name: Get Project Version
        id: project_version
        run: echo "VERSION=$(./gradlew -q properties | grep '^version:' | awk '{print $2}')" >> $GITHUB_ENV

      # Logins
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PAT }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push docker image (DockerHub + ECR)
        env:
          PROJECT_NAME: ${{ env.PROJECT_NAME }}
          VERSION: ${{ env.VERSION }}
          DOCKERHUB_ORG: ${{ secrets.DOCKERHUB_ORG }}
          ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
        run: |
          set -euo pipefail
          TAG="v${VERSION}"

          DH_IMAGE="docker.io/${DOCKERHUB_ORG}/${PROJECT_NAME}:${TAG}"
          DH_LATEST="docker.io/${DOCKERHUB_ORG}/${PROJECT_NAME}:latest"

          ECR_IMAGE="${ECR_REGISTRY}/${ECR_REPOSITORY}:${TAG}"
          ECR_LATEST="${ECR_REGISTRY}/${ECR_REPOSITORY}:latest"

          docker build -f docker/Dockerfile --build-arg SKIP_TESTS=true -t "${DH_IMAGE}" .
          docker tag "${DH_IMAGE}" "${DH_LATEST}"
          docker tag "${DH_IMAGE}" "${ECR_IMAGE}"
          docker tag "${DH_IMAGE}" "${ECR_LATEST}"

          docker push "${DH_IMAGE}"
          docker push "${DH_LATEST}"

          docker push "${ECR_IMAGE}"
          docker push "${ECR_LATEST}"

  tag-create:
    if: inputs.target == 'tag-create'
    name: Validate & Create Tag
    runs-on: ubuntu-latest
    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'gradle'

      - name: Make Gradlew Executable
        run: chmod +x ./gradlew

      - name: Get Project Version
        id: project_version
        run: echo "VERSION=$(./gradlew -q properties | grep '^version:' | awk '{print $2}')" >> $GITHUB_ENV

      - name: Check for existing release tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ env.VERSION }}
        run: |
          TAG_EXISTS=$(curl -H "Authorization: token $GITHUB_TOKEN" -s https://api.github.com/repos/${{ github.repository }}/releases | jq -r ".[] | select(.tag_name == \"v$VERSION\") | .tag_name")
          if [ "$TAG_EXISTS" == "v$VERSION" ]; then
            echo "::error::Release tag v$VERSION already exists."
            exit 1
          else
            echo "No existing release with tag v$VERSION found. Proceeding."
          fi

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: "v${{ env.VERSION }}"
          release_name: "v${{ env.VERSION }}"
          body: "Release of version v${{ env.VERSION }}"
          draft: false
          prerelease: false
