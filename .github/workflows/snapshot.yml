name: Snapshot

on:
  pull_request:
    branches:
      - main
    types: [ opened, synchronize, reopened ]

permissions:
  packages: write

jobs:
  docker-snapshot:
    name: Build & Push Snapshot Image
    concurrency:
      group: snapshot-${{ github.head_ref }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'gradle'

      - name: Make Gradlew Executable
        run: chmod +x ./gradlew

      - name: Get Project Name
        id: project_name
        run: echo "PROJECT_NAME=$(./gradlew -q properties | grep '^name:' | awk '{print $2}')" >> $GITHUB_ENV

      - name: Get Project Version
        id: project_version
        run: echo "VERSION=$(./gradlew -q properties | grep '^version:' | awk '{print $2}')" >> $GITHUB_ENV

      # Logins
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PAT }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push snapshot image (DockerHub + ECR)
        env:
          PROJECT_NAME: ${{ env.PROJECT_NAME }}
          VERSION: ${{ env.VERSION }}
          DOCKERHUB_ORG: ${{ secrets.DOCKERHUB_ORG }}
          ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
        run: |
          set -euo pipefail
          TAG="v${VERSION}-pr-${{ github.event.number }}"

          DH_IMAGE="docker.io/${DOCKERHUB_ORG}/${PROJECT_NAME}:${TAG}"
          ECR_IMAGE="${ECR_REGISTRY}/${ECR_REPOSITORY}:${TAG}"

          docker build -f docker/Dockerfile --build-arg SKIP_TESTS=true -t "${DH_IMAGE}" .
          docker tag "${DH_IMAGE}" "${ECR_IMAGE}"

          docker push "${DH_IMAGE}"
          docker push "${ECR_IMAGE}"

          echo "### 🐳 Snapshot image pushed" >> $GITHUB_STEP_SUMMARY
          echo "- **DockerHub:** \`${DH_IMAGE}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **ECR:** \`${ECR_IMAGE}\`" >> $GITHUB_STEP_SUMMARY
